<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .anvil{fill:#e06530}.hammer{fill:#e8b44a}.spark{fill:#4ca8a8;opacity:0}
    .s1{animation:spark 2.5s ease-out infinite}.s2{animation:spark 2.5s ease-out .4s infinite}.s3{animation:spark 2.5s ease-out .8s infinite}.s4{animation:spark 2.5s ease-out 1.2s infinite}
    .strike{animation:hammerSwing 2.5s ease-in-out infinite;transform-origin:30px 10px}
    .glow{animation:forgeGlow 2.5s ease-in-out infinite}
    @keyframes spark{0%{opacity:0;transform:translate(0,0) scale(1)}20%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
    @keyframes hammerSwing{0%,100%{transform:rotate(0deg)}40%{transform:rotate(-25deg)}50%{transform:rotate(5deg)}60%{transform:rotate(0deg)}}
    @keyframes forgeGlow{0%,100%{opacity:.15}50%{opacity:.35}}
    @media(prefers-reduced-motion:reduce){.s1,.s2,.s3,.s4,.strike,.glow{animation:none!important}.spark{opacity:0}}
  </style>
  <!-- Glow -->
  <circle class="glow" cx="18" cy="32" r="14" fill="#e06530" opacity=".15"/>
  <!-- Anvil -->
  <path class="anvil" d="M8 30h20v4H6l2-4zm2 4h16v6H10z" opacity=".9"/>
  <rect class="anvil" x="12" y="28" width="12" height="2" rx="1" opacity=".7"/>
  <!-- Hammer -->
  <g class="strike">
    <rect class="hammer" x="26" y="8" width="12" height="6" rx="1.5"/>
    <rect fill="#d8a040" x="20" y="10" width="14" height="2" rx="1"/>
  </g>
  <!-- Sparks -->
  <circle class="spark s1" cx="20" cy="28" r="1.5" style="--dx:-8px;--dy:-12px"/>
  <circle class="spark s2" cx="22" cy="28" r="1.2" style="--dx:6px;--dy:-14px"/>
  <circle class="spark s3" cx="18" cy="28" r="1" style="--dx:-12px;--dy:-8px"/>
  <circle class="spark s4" cx="24" cy="28" r="1.3" style="--dx:10px;--dy:-10px"/>
</svg>