<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .lens{fill:none;stroke:#e8b44a;stroke-width:2}
    .handle{stroke:#e8b44a;stroke-width:2.5;stroke-linecap:round}
    .doc{fill:none;stroke-width:1.2;stroke-linecap:round}
    .d1{stroke:#e06530}.d2{stroke:#4ca8a8}.d3{stroke:#e8b44a}
    .scan{animation:scanPulse 3s ease-in-out infinite;transform-origin:18px 18px}
    .doc-float{animation:docFloat 4s ease-in-out infinite}
    .df1{animation-delay:0s}.df2{animation-delay:.5s}.df3{animation-delay:1s}
    .cite{animation:citeGlow 2s ease-in-out infinite}
    .rerank{animation:rerankSlide 3s ease-in-out infinite}
    @keyframes scanPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes docFloat{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(-3px);opacity:1}}
    @keyframes citeGlow{0%,100%{opacity:.4}50%{opacity:.8}}
    @keyframes rerankSlide{0%,100%{transform:translateX(0)}50%{transform:translateX(2px)}}
    @media(prefers-reduced-motion:reduce){.scan,.doc-float,.cite,.rerank{animation:none!important}}
  </style>
  <!-- Magnifying glass -->
  <g class="scan">
    <circle class="lens" cx="18" cy="18" r="10"/>
    <line class="handle" x1="26" y1="26" x2="34" y2="34"/>
    <!-- Crosshair inside lens -->
    <line x1="13" y1="18" x2="23" y2="18" stroke="#e8b44a" stroke-width=".8" opacity=".5"/>
    <line x1="18" y1="13" x2="18" y2="23" stroke="#e8b44a" stroke-width=".8" opacity=".5"/>
  </g>
  <!-- Floating document results -->
  <g class="doc-float df1">
    <rect class="doc d1" x="32" y="6" width="12" height="8" rx="1.5"/>
    <line x1="34" y1="9" x2="42" y2="9" stroke="#e06530" stroke-width=".8" opacity=".6"/>
    <line x1="34" y1="11" x2="39" y2="11" stroke="#e06530" stroke-width=".8" opacity=".4"/>
  </g>
  <g class="doc-float df2">
    <rect class="doc d2" x="34" y="18" width="12" height="8" rx="1.5"/>
    <line x1="36" y1="21" x2="44" y2="21" stroke="#4ca8a8" stroke-width=".8" opacity=".6"/>
    <line x1="36" y1="23" x2="41" y2="23" stroke="#4ca8a8" stroke-width=".8" opacity=".4"/>
  </g>
  <g class="doc-float df3">
    <rect class="doc d3" x="30" y="30" width="12" height="8" rx="1.5"/>
    <line x1="32" y1="33" x2="40" y2="33" stroke="#e8b44a" stroke-width=".8" opacity=".6"/>
    <line x1="32" y1="35" x2="37" y2="35" stroke="#e8b44a" stroke-width=".8" opacity=".4"/>
  </g>
  <!-- DOI cite badge -->
  <text class="cite" x="38" y="44" font-family="'JetBrains Mono',monospace" font-size="5" fill="#4ca8a8" text-anchor="middle">DOI</text>
</svg>