<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .strand{fill:none;stroke-width:2;stroke-linecap:round}
    .s-l{stroke:#e06530}.s-r{stroke:#4ca8a8}
    .rung{stroke:#e8b44a;stroke-width:1.5;stroke-linecap:round;opacity:.6}
    .node{r:2.5}
    .rotate{animation:dnaRotate 8s linear infinite;transform-origin:24px 24px}
    .pulse-o{animation:traitPulse 3s ease-in-out infinite}
    .pulse-c{animation:traitPulse 3s ease-in-out .5s infinite}
    .pulse-e{animation:traitPulse 3s ease-in-out 1s infinite}
    .pulse-a{animation:traitPulse 3s ease-in-out 1.5s infinite}
    .pulse-em{animation:traitPulse 3s ease-in-out 2s infinite}
    .pulse-hh{animation:traitPulse 3s ease-in-out 2.5s infinite}
    @keyframes dnaRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes traitPulse{0%,100%{r:2.5;opacity:.8}50%{r:3.5;opacity:1}}
    @media(prefers-reduced-motion:reduce){.rotate,.pulse-o,.pulse-c,.pulse-e,.pulse-a,.pulse-em,.pulse-hh{animation:none!important}}
  </style>
  <!-- Double helix strands -->
  <g class="rotate">
    <path class="strand s-l" d="M12 4c6 4 12-4 18 0s6 8 0 12-12-4-18 0-6 8 0 12 6 4 12-4 18 0"/>
    <path class="strand s-r" d="M18 4c-6 4-12-4-18 0s-6 8 0 12 12-4 18 0 6 8 0 12-6 4-12-4-18 0" transform="translate(36,0)"/>
  </g>
  <!-- Trait nodes (6 HEXACO factors) -->
  <circle class="node pulse-o" cx="15" cy="10" fill="#e06530"/>
  <circle class="node pulse-c" cx="33" cy="14" fill="#e8b44a"/>
  <circle class="node pulse-e" cx="15" cy="20" fill="#4ca8a8"/>
  <circle class="node pulse-a" cx="33" cy="24" fill="#e06530"/>
  <circle class="node pulse-em" cx="15" cy="32" fill="#e8b44a"/>
  <circle class="node pulse-hh" cx="33" cy="38" fill="#4ca8a8"/>
  <!-- Rungs connecting traits -->
  <line class="rung" x1="15" y1="10" x2="33" y2="14"/>
  <line class="rung" x1="15" y1="20" x2="33" y2="24"/>
  <line class="rung" x1="15" y1="32" x2="33" y2="38"/>
</svg>