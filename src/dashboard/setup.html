<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Genesis — Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0806; --bg2: #14110e; --bg3: #1c1915;
    --border: #302a22; --text-1: #f0e8d8; --text-2: #c4b89c; --text-3: #8a7e6c;
    --rust: #e06530; --amber: #e8b44a; --teal: #4ca8a8; --green: #6aad48;
    --vis: #e8b44a; --eng: #4ca8a8;
    --sans: 'Inter',system-ui,sans-serif;
    --mono: 'SF Mono',Menlo,'Cascadia Code','JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text-1);font-family:var(--sans);display:flex;flex-direction:column}
  a{color:var(--amber);text-decoration:none}

  .top{display:flex;justify-content:space-between;align-items:center;padding:4px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .logo{font-family:var(--mono);font-size:13px;font-weight:700}
  .logo small{color:var(--rust);font-size:9px;letter-spacing:1px;margin-left:4px}
  .top-right{display:flex;gap:12px;align-items:center;font-size:11px}

  .main{flex:1;display:flex;flex-direction:column;padding:8px 12px;gap:6px;overflow:hidden}

  /* Preset + title row */
  .title-row{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .title-row h1{font-size:14px;color:var(--amber);font-family:var(--mono)}
  .title-row .controls{display:flex;gap:6px;align-items:center;font-size:11px}
  .title-row select{background:var(--bg3);color:var(--text-1);border:1px solid var(--border);padding:3px 8px;border-radius:3px;font-family:var(--sans);font-size:11px}
  .sm-btn{background:var(--bg3);color:var(--text-2);border:1px solid var(--border);padding:3px 10px;border-radius:3px;font-size:10px;cursor:pointer;font-family:var(--sans)}
  .sm-btn:hover{border-color:var(--amber);color:var(--text-1)}

  /* Leaders side-by-side */
  .leaders{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
  .lp{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px 10px}
  .lp h2{font-size:11px;margin-bottom:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
  .lp h2.v{color:var(--vis)}.lp h2.e{color:var(--eng)}

  /* Compact fields */
  .row{display:flex;gap:6px;margin-bottom:4px}
  .row .f{flex:1}
  .f label{display:block;font-size:8px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:1px}
  .f input,.f textarea,.f select{width:100%;background:var(--bg3);color:var(--text-1);border:1px solid var(--border);padding:3px 6px;border-radius:3px;font-family:var(--sans);font-size:11px}
  .f textarea{height:32px;resize:none;font-size:10px}
  .f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:var(--amber)}

  /* HEXACO - 3 columns of sliders */
  .hex{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 8px}
  .sr{display:flex;align-items:center;gap:3px}
  .sr label{font-size:9px;color:var(--text-2);min-width:24px;font-weight:600}
  .sr input[type=range]{flex:1;accent-color:var(--amber);height:3px}
  .sr .sv{font-size:10px;color:var(--text-1);font-family:var(--mono);min-width:26px;text-align:right}
  .sr.eng input[type=range]{accent-color:var(--teal)}

  /* Bottom sections grid */
  .bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex-shrink:0}
  .section{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px 10px}
  .section h3{font-size:10px;color:var(--text-2);margin-bottom:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}

  /* Events */
  .ev-row{display:flex;gap:4px;margin-bottom:3px;align-items:center}
  .ev-row input{background:var(--bg3);color:var(--text-1);border:1px solid var(--border);padding:2px 5px;border-radius:3px;font-size:10px}
  .ev-row input:first-child{width:40px}
  .ev-row input:nth-child(2){flex:1}
  .rm{background:none;border:none;color:var(--rust);cursor:pointer;font-size:12px;padding:0 2px}
  .add{background:none;color:var(--amber);border:1px solid var(--border);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer}

  /* Launch bar */
  .launch-bar{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 0;flex-shrink:0}
  .launch-btn{background:linear-gradient(135deg,var(--rust),#c44a1e);color:white;border:none;padding:8px 32px;border-radius:4px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--sans)}
  .launch-btn:hover{filter:brightness(1.1)}
  .launch-btn:disabled{opacity:.5;cursor:not-allowed}
  .launch-status{font-size:11px;color:var(--text-3)}
</style>
</head>
<body>

<div class="top">
  <div class="logo">AgentOS <small>MARS GENESIS</small></div>
  <div class="top-right"><a href="/">Dashboard</a></div>
</div>

<div class="main">
  <!-- Title + preset + import/export -->
  <div class="title-row">
    <h1>Setup</h1>
    <div class="controls">
      <select id="preset" onchange="applyPreset(this.value)">
        <option value="default">Default (Visionary vs Engineer)</option>
        <option value="balanced">Balanced Founders</option>
        <option value="extreme">High Risk vs Ultra Cautious</option>
        <option value="custom">Custom</option>
      </select>
      <button class="sm-btn" onclick="exportConfig()">Export</button>
      <button class="sm-btn" onclick="document.getElementById('imp').click()">Import</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importConfig(event)">
    </div>
  </div>

  <!-- Leaders -->
  <div class="leaders">
    <div class="lp">
      <h2 class="v">Leader A</h2>
      <div class="row"><div class="f"><label>Name</label><input id="a-name" value="Aria Chen"></div><div class="f"><label>Archetype</label><input id="a-arch" value="The Visionary"></div><div class="f"><label>Colony</label><input id="a-colony" value="Ares Horizon"></div></div>
      <div class="hex" id="a-hex">
        <div class="sr"><label>O</label><input type="range" min="0" max="1" step=".01" value=".95" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.95</span></div>
        <div class="sr"><label>C</label><input type="range" min="0" max="1" step=".01" value=".35" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.35</span></div>
        <div class="sr"><label>E</label><input type="range" min="0" max="1" step=".01" value=".85" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.85</span></div>
        <div class="sr"><label>A</label><input type="range" min="0" max="1" step=".01" value=".55" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.55</span></div>
        <div class="sr"><label>Em</label><input type="range" min="0" max="1" step=".01" value=".30" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.30</span></div>
        <div class="sr"><label>HH</label><input type="range" min="0" max="1" step=".01" value=".65" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.65</span></div>
      </div>
      <div class="f" style="margin-top:4px"><label>Instructions</label><textarea id="a-instr">You are Commander Aria Chen. Bold expansion, calculated risks. Favor higher upside. Respond with JSON.</textarea></div>
    </div>
    <div class="lp">
      <h2 class="e">Leader B</h2>
      <div class="row"><div class="f"><label>Name</label><input id="b-name" value="Dietrich Voss"></div><div class="f"><label>Archetype</label><input id="b-arch" value="The Engineer"></div><div class="f"><label>Colony</label><input id="b-colony" value="Meridian Base"></div></div>
      <div class="hex" id="b-hex">
        <div class="sr eng"><label>O</label><input type="range" min="0" max="1" step=".01" value=".25" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.25</span></div>
        <div class="sr eng"><label>C</label><input type="range" min="0" max="1" step=".01" value=".97" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.97</span></div>
        <div class="sr eng"><label>E</label><input type="range" min="0" max="1" step=".01" value=".30" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.30</span></div>
        <div class="sr eng"><label>A</label><input type="range" min="0" max="1" step=".01" value=".45" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.45</span></div>
        <div class="sr eng"><label>Em</label><input type="range" min="0" max="1" step=".01" value=".70" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.70</span></div>
        <div class="sr eng"><label>HH</label><input type="range" min="0" max="1" step=".01" value=".90" oninput="this.nextElementSibling.textContent=this.value"><span class="sv">.90</span></div>
      </div>
      <div class="f" style="margin-top:4px"><label>Instructions</label><textarea id="b-instr">You are Commander Dietrich Voss. Engineering discipline, safety margins. Favor lower risk. Respond with JSON.</textarea></div>
    </div>
  </div>

  <!-- Bottom: Sim + Events + API -->
  <div class="bottom">
    <div class="section">
      <h3>Simulation</h3>
      <div class="row"><div class="f"><label>Turns</label><input id="turns" type="number" min="1" max="12" value="12"></div><div class="f"><label>Seed</label><input id="seed" type="number" value="950"></div></div>
      <div class="row"><div class="f"><label>Start Year</label><input id="start-year" type="number" value="2035"></div><div class="f"><label>Search</label><select id="live-search"><option value="false">Off</option><option value="true">On</option></select></div></div>
    </div>
    <div class="section">
      <h3>Custom Events</h3>
      <div id="events-list"></div>
      <button class="add" onclick="addEvent()">+ Event</button>
    </div>
    <div class="section">
      <h3>API & Models</h3>
      <div class="f"><label>OpenAI Key</label><input id="api-key" type="password" placeholder="sk-..." value="__SERVER_API_KEY__"></div>
      <div class="row" style="margin-top:4px"><div class="f"><label>Commander</label><select id="model-cmd"><option value="gpt-5.4">gpt-5.4</option><option value="gpt-4o">gpt-4o</option><option value="gpt-4o-mini">gpt-4o-mini</option></select></div><div class="f"><label>Dept</label><select id="model-dept"><option value="gpt-5.4-mini">gpt-5.4-mini</option><option value="gpt-4o-mini">gpt-4o-mini</option></select></div><div class="f"><label>Judge</label><select id="model-judge"><option value="gpt-5.4">gpt-5.4</option><option value="gpt-4o">gpt-4o</option></select></div></div>
    </div>
  </div>

  <!-- Launch -->
  <div class="launch-bar">
    <button class="launch-btn" id="launch-btn" onclick="launch()">Start Simulation</button>
    <span class="launch-status" id="launch-status"></span>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const TRAITS = ['openness','conscientiousness','extraversion','agreeableness','emotionality','honestyHumility'];

function getHex(p) {
  const s = document.querySelectorAll(`#${p}-hex input[type=range]`);
  const h = {}; s.forEach((el, i) => h[TRAITS[i]] = parseFloat(el.value)); return h;
}
function setHex(p, h) {
  const s = document.querySelectorAll(`#${p}-hex input[type=range]`);
  s.forEach((el, i) => { el.value = h[TRAITS[i]]; el.nextElementSibling.textContent = Number(h[TRAITS[i]]).toFixed(2); });
}

const PRESETS = {
  default: {
    a:{name:'Aria Chen',arch:'The Visionary',colony:'Ares Horizon',hexaco:{openness:.95,conscientiousness:.35,extraversion:.85,agreeableness:.55,emotionality:.3,honestyHumility:.65},instr:'You are Commander Aria Chen. Bold expansion, calculated risks. Favor higher upside. Respond with JSON.'},
    b:{name:'Dietrich Voss',arch:'The Engineer',colony:'Meridian Base',hexaco:{openness:.25,conscientiousness:.97,extraversion:.3,agreeableness:.45,emotionality:.7,honestyHumility:.9},instr:'You are Commander Dietrich Voss. Engineering discipline, safety margins. Favor lower risk. Respond with JSON.'},
    turns:12,seed:950
  },
  balanced: {
    a:{name:'Maya Torres',arch:'The Diplomat',colony:'Concordia',hexaco:{openness:.6,conscientiousness:.55,extraversion:.65,agreeableness:.7,emotionality:.5,honestyHumility:.6},instr:'You are Commander Maya Torres. Seek consensus, balance risks. Respond with JSON.'},
    b:{name:'Kenji Nakamura',arch:'The Pragmatist',colony:'Olympus Landing',hexaco:{openness:.5,conscientiousness:.6,extraversion:.45,agreeableness:.55,emotionality:.55,honestyHumility:.65},instr:'You are Commander Kenji Nakamura. Practical, data-informed. Respond with JSON.'},
    turns:12,seed:950
  },
  extreme: {
    a:{name:'Zara Okafor',arch:'The Gambler',colony:'Frontier Prime',hexaco:{openness:.99,conscientiousness:.15,extraversion:.9,agreeableness:.3,emotionality:.1,honestyHumility:.4},instr:'You are Commander Zara Okafor. Maximum risk, maximum reward. Respond with JSON.'},
    b:{name:'Heinrich Weber',arch:'The Fortress',colony:'Bastion Colony',hexaco:{openness:.05,conscientiousness:.99,extraversion:.1,agreeableness:.6,emotionality:.95,honestyHumility:.95},instr:'You are Commander Heinrich Weber. Zero tolerance for unnecessary risk. Respond with JSON.'},
    turns:12,seed:950
  }
};

function applyPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  $('a-name').value=p.a.name; $('a-arch').value=p.a.arch; $('a-colony').value=p.a.colony; $('a-instr').value=p.a.instr; setHex('a',p.a.hexaco);
  $('b-name').value=p.b.name; $('b-arch').value=p.b.arch; $('b-colony').value=p.b.colony; $('b-instr').value=p.b.instr; setHex('b',p.b.hexaco);
  $('turns').value=p.turns; $('seed').value=p.seed;
}

let ec=0;
function addEvent(t='',ti='') {
  ec++;const d=document.createElement('div');d.className='ev-row';d.id=`ev-${ec}`;
  d.innerHTML=`<input type="number" min="1" max="12" placeholder="T" value="${t}"><input placeholder="Title" value="${ti}"><button class="rm" onclick="this.parentElement.remove()">x</button>`;
  $('events-list').appendChild(d);
}
function getEvents() {
  return Array.from(document.querySelectorAll('.ev-row')).map(r => {
    const ins=r.querySelectorAll('input');
    return {turn:parseInt(ins[0].value)||0,title:ins[1].value,description:''};
  }).filter(e=>e.turn>0&&e.title);
}

function buildConfig() {
  return {
    leaders:[
      {name:$('a-name').value,archetype:$('a-arch').value,colony:$('a-colony').value,hexaco:getHex('a'),instructions:$('a-instr').value},
      {name:$('b-name').value,archetype:$('b-arch').value,colony:$('b-colony').value,hexaco:getHex('b'),instructions:$('b-instr').value},
    ],
    turns:parseInt($('turns').value)||12, seed:parseInt($('seed').value)||950,
    liveSearch:$('live-search').value==='true', customEvents:getEvents(),
    models:{commander:$('model-cmd').value,departments:$('model-dept').value,judge:$('model-judge').value},
  };
}

function exportConfig() {
  const cfg = buildConfig();
  const blob = new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mars-genesis-config.json'; a.click();
}

function importConfig(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const cfg = JSON.parse(r.result);
      if(cfg.leaders && cfg.leaders.length>=2) {
        const a=cfg.leaders[0],b=cfg.leaders[1];
        $('a-name').value=a.name||''; $('a-arch').value=a.archetype||''; $('a-colony').value=a.colony||''; $('a-instr').value=a.instructions||''; if(a.hexaco) setHex('a',a.hexaco);
        $('b-name').value=b.name||''; $('b-arch').value=b.archetype||''; $('b-colony').value=b.colony||''; $('b-instr').value=b.instructions||''; if(b.hexaco) setHex('b',b.hexaco);
      }
      if(cfg.turns) $('turns').value=cfg.turns;
      if(cfg.seed) $('seed').value=cfg.seed;
      $('preset').value='custom';
    } catch(err) { alert('Invalid config file'); }
  };
  r.readAsText(file);
}

async function launch() {
  const btn=$('launch-btn'), st=$('launch-status');
  btn.disabled=true; st.textContent='Starting...';
  const cfg = buildConfig(); cfg.apiKey = $('api-key').value;
  try {
    const res = await fetch('/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
    const data = await res.json();
    if(data.redirect) { st.textContent='Redirecting...'; window.location.href=data.redirect; }
    else { st.textContent='Error: '+(data.error||'unknown'); btn.disabled=false; }
  } catch(err) { st.textContent='Failed: '+err; btn.disabled=false; }
}
</script>
</body>
</html>
