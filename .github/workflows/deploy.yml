name: Build, Deploy & Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

env:
  NODE_VERSION: '22'
  SERVER_IP: '***REMOVED***'
  APP_DIR: /opt/paracosm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (engine + runtime)
        run: npm run build

      - name: Install dashboard dependencies
        run: cd src/cli/dashboard && npm ci

      - name: Build dashboard
        run: npm run dashboard:build

      - name: Run tests
        run: npm test || true

      - name: Build API docs (TypeDoc)
        run: |
          npm run docs
          cp assets/docs-theme/paracosm-override.css docs/api/assets/paracosm-override.css

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist/
            src/cli/dashboard/dist/
            docs/api/
            assets/
            package.json
            package-lock.json
            src/
            leaders.json
            typedoc.json
            tsconfig.json
            tsconfig.build.json
            .env.example
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Linode
        run: |
          SSH="ssh -i ~/.ssh/deploy_key root@${{ env.SERVER_IP }}"

          # Sync build to server (exclude .env and node_modules so they persist)
          rsync -azP --delete --exclude='.env' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key" \
            build/ root@${{ env.SERVER_IP }}:${{ env.APP_DIR }}/

          # Install production deps and restart
          $SSH << 'REMOTE'
          set -e
          cd /opt/paracosm

          # Install production dependencies
          npm ci --omit=dev 2>/dev/null || npm install --omit=dev

          # Restart with pm2
          pm2 delete paracosm 2>/dev/null || true
          pm2 start "npx tsx src/cli/serve.ts" \
            --name paracosm \
            --max-memory-restart 3G \
            --env production
          pm2 save

          echo "Paracosm deployed and running"
          REMOTE

  docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Deploy API docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/api
          cname: docs.agentos.sh

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Auto-version from run number
        id: version
        run: |
          # Use major.minor from package.json + GitHub run number as patch
          # Always unique, never collides, no commit-back needed
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR _ <<< "$CURRENT"
          NEXT="${MAJOR}.${MINOR}.${{ github.run_number }}"
          node -e "const p=require('./package.json'); p.version='${NEXT}'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n')"
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "Publishing ${NEXT} (run #${{ github.run_number }})"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
